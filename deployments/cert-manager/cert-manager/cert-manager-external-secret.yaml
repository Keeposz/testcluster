---
apiVersion: external-secrets.io/v1 # welke api versie van external secrets
kind: ExternalSecret # dit is een external secret resource, geen gewone k8s secret
metadata:
  name: cloudflare-api-token # naam van deze external secret in k8s
  namespace: cert-manager # namespace waar deze external secret leeft
spec:
  refreshInterval: "1h" # hoe vaak ESO checkt of het secret in vault is veranderd
  secretStoreRef: 
    name: vault-secret-store # naam van clustersecretstore (brug naar vault) 
    kind: ClusterSecretStore # type store: cluster-wide, werkt in alle namespaces
  target:
    name: cloudflare-api-token # deze key komt in de k8s secret die ESO aanmaakt
                        # dit is wat cert-manager ziet als "existing secret" in de helm chart
  data:
  - secretKey: api-token # key binnen k8s secret (wat app verwacht)
    remoteRef:
      key: cert-manager/cloudflare # pad in vault (kubernetes/cert-manager/cloudflare) waar ESO de waarde haalt
      property: cloudflare-api-token # naam zoals je het in vault hebt aangemaakt
  