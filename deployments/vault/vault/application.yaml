---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<YOUR_GITHUB_USERNAME>/testcluster.git
    path: deployments/vault/vault
    targetRevision: HEAD
    helm:
      releaseName: vault
      valuesObject:
        vault:
          server:
            extraSecretEnvironmentVars:
              - envName: VAULT_PG_CONNECTION_URL
                secretName: vault-db-dsn
                secretKey: VAULT_PG_CONNECTION_URL
            standalone:
              enabled: true
              config: |-
                ui = true
                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                  telemetry {
                    unauthenticated_metrics_access = "true"
                  }
                }
                storage "postgresql" {}

  destination:
    server: "https://kubernetes.default.svc"
    namespace: vault
  syncPolicy:
    automated:
      prune: false
      selfHeal: false

  info:
  - name: releasenotes
    value: https://github.com/hashicorp/vault/releases
  - name: values.yaml
    value: https://github.com/hashicorp/vault-helm/blob/main/values.yaml